<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0f1a;
      --surface: #141828;
      --card: #1a1f35;
      --border: #252a45;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --green: #43e97b;
      --yellow: #f9ca24;
      --text: #e8eaf6;
      --muted: #6b7280;
      --radius: 14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a1f35 0%, #0f1525 100%);
      border-bottom: 1px solid var(--border);
      padding: 24px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .logo-dot {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header h1 span { color: var(--accent); }

    .header-badge {
      margin-left: auto;
      background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.3);
      color: var(--accent);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    /* ── Main Layout ── */
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* ── Stats Row ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      transition: transform 0.2s;
    }

    .stat-card:hover { transform: translateY(-2px); }

    .stat-number {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label { font-size: 0.78rem; color: var(--muted); font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
    .stat-card.total .stat-number { color: var(--accent); }
    .stat-card.done .stat-number { color: var(--green); }
    .stat-card.pending .stat-number { color: var(--yellow); }

    /* ── Add Task Form ── */
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 32px;
    }

    .form-card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-card h2::before {
      content: '';
      width: 4px; height: 18px;
      background: linear-gradient(to bottom, var(--accent), var(--accent2));
      border-radius: 4px;
      display: block;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 0.78rem; color: var(--muted); font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }

    .form-group input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 11px 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }

    .btn-add {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), #8b85ff);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.02em;
    }

    .btn-add:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-add:active { transform: translateY(0); }

    /* ── Task List ── */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .list-header h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .list-header h2::before {
      content: '';
      width: 4px; height: 18px;
      background: linear-gradient(to bottom, var(--accent2), var(--yellow));
      border-radius: 4px;
      display: block;
    }

    #filter-btns { display: flex; gap: 8px; }

    .filter-btn {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active {
      background: rgba(108,99,255,0.2);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Task Cards ── */
    #task-list { display: flex; flex-direction: column; gap: 12px; }

    .task-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: transform 0.2s, border-color 0.2s;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover { transform: translateX(3px); border-color: rgba(108,99,255,0.3); }
    .task-item.done { opacity: 0.6; }
    .task-item.done .task-title { text-decoration: line-through; color: var(--muted); }

    .task-check {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      transition: all 0.2s;
    }

    .task-check:hover { border-color: var(--green); }
    .task-item.done .task-check { background: var(--green); border-color: var(--green); }
    .task-item.done .task-check::after { content: '✓'; font-size: 12px; color: #000; font-weight: bold; }

    .task-info { flex: 1; min-width: 0; }
    .task-title { font-weight: 500; font-size: 0.95rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .task-meta { display: flex; align-items: center; gap: 10px; }

    .task-subject {
      font-size: 0.73rem;
      background: rgba(108,99,255,0.12);
      color: #a89cff;
      padding: 2px 9px;
      border-radius: 20px;
      font-weight: 500;
    }

    .task-date { font-size: 0.73rem; color: var(--muted); }

    .task-status {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-Pending { background: rgba(249,202,36,0.12); color: var(--yellow); }
    .status-Done    { background: rgba(67,233,123,0.12); color: var(--green); }

    .btn-delete {
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-delete:hover { color: var(--accent2); border-color: rgba(255,101,132,0.3); background: rgba(255,101,132,0.08); }

    /* ── Empty State ── */
    #empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      display: none;
    }

    #empty-state .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
    #empty-state p { font-size: 0.9rem; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 30px; right: 30px;
      background: var(--card);
      border: 1px solid var(--accent);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 999;
      pointer-events: none;
    }

    #toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 600px) {
      header { padding: 16px 20px; }
      main { padding: 24px 16px; }
      .stats { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .stat-number { font-size: 1.5rem; }
      .form-row { grid-template-columns: 1fr; }
      #filter-btns { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-dot">📋</div>
  <h1>Task<span>Flow</span></h1>
  <span class="header-badge">Student Edition</span>
</header>

<main>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card total">
      <div class="stat-number" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card done">
      <div class="stat-number" id="stat-done">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat-card pending">
      <div class="stat-number" id="stat-pending">0</div>
      <div class="stat-label">Pending</div>
    </div>
  </div>

  <!-- Add Task -->
  <div class="form-card">
    <h2>Add New Task</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Task Title</label>
        <input type="text" id="input-title" placeholder="e.g. Complete Assignment 3" />
      </div>
      <div class="form-group">
        <label>Subject</label>
        <input type="text" id="input-subject" placeholder="e.g. DevOps" />
      </div>
    </div>
    <button class="btn-add" onclick="addTask()">+ Add Task</button>
  </div>

  <!-- Task List -->
  <div class="list-header">
    <h2>My Tasks</h2>
    <div id="filter-btns">
      <button class="filter-btn active" onclick="setFilter('All', this)">All</button>
      <button class="filter-btn" onclick="setFilter('Pending', this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('Done', this)">Done</button>
    </div>
  </div>

  <div id="task-list"></div>

  <div id="empty-state">
    <div class="empty-icon">🗂️</div>
    <p>No tasks yet. Add your first task above!</p>
  </div>

</main>

<div id="toast"></div>

<script>
  let allTasks = [];
  let currentFilter = 'All';

  async function loadTasks() {
    const res = await fetch('/api/tasks');
    allTasks = await res.json();
    renderTasks();
    updateStats();
  }

  function renderTasks() {
    const list = document.getElementById('task-list');
    const empty = document.getElementById('empty-state');
    const filtered = currentFilter === 'All' ? allTasks : allTasks.filter(t => t.status === currentFilter);

    if (filtered.length === 0) {
      list.innerHTML = '';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    list.innerHTML = filtered.map(t => `
      <div class="task-item ${t.status === 'Done' ? 'done' : ''}" id="task-${t.id}">
        <div class="task-check" onclick="toggleTask(${t.id}, '${t.status}')"></div>
        <div class="task-info">
          <div class="task-title">${t.title}</div>
          <div class="task-meta">
            <span class="task-subject">${t.subject}</span>
            <span class="task-date">${new Date(t.created_at).toLocaleDateString('en-US', {month:'short', day:'numeric'})}</span>
          </div>
        </div>
        <span class="task-status status-${t.status}">${t.status}</span>
        <button class="btn-delete" onclick="deleteTask(${t.id})">✕</button>
      </div>
    `).join('');
  }

  function updateStats() {
    const done = allTasks.filter(t => t.status === 'Done').length;
    const pending = allTasks.filter(t => t.status === 'Pending').length;
    document.getElementById('stat-total').textContent = allTasks.length;
    document.getElementById('stat-done').textContent = done;
    document.getElementById('stat-pending').textContent = pending;
  }

  async function addTask() {
    const title = document.getElementById('input-title').value.trim();
    const subject = document.getElementById('input-subject').value.trim();
    if (!title || !subject) { showToast('⚠️ Please fill in both fields!'); return; }

    await fetch('/api/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, subject })
    });

    document.getElementById('input-title').value = '';
    document.getElementById('input-subject').value = '';
    showToast('✅ Task added!');
    loadTasks();
  }

  async function toggleTask(id, currentStatus) {
    const newStatus = currentStatus === 'Pending' ? 'Done' : 'Pending';
    await fetch(`/api/tasks/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus })
    });
    loadTasks();
  }

  async function deleteTask(id) {
    await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
    showToast('🗑️ Task deleted');
    loadTasks();
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTasks();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  loadTasks();
</script>
</body>
</html>
